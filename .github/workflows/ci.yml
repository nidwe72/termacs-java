name: ci
on:
  push:
    branches: [main]
  pull_request:
jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build libncursesw5-dev
      - name: Build native JNI (FetchContent pulls termacs-core v0.1.0)
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build
      - name: Compile Java
        run: javac --release 17 -d build/classes src/main/java/sciens/termacs/*.java src/test/java/sciens/termacs/HeadlessTest.java
      - name: Headless test
        run: java -ea -Dtermacs.jni="$PWD/build/libtermacsjni.so" --enable-native-access=ALL-UNNAMED -cp build/classes sciens.termacs.HeadlessTest
